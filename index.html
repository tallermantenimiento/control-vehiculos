<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Control de Vehículos</title>
<style>
:root{--bg:#0f172a;--panel:#1f2937;--panel2:#263244;--txt:#f8fafc;--mut:#cbd5e1;--line:#3b475a;--ok:#16a34a;--warn:#f59e0b;--bad:#dc2626;--blue:#2563eb;--violet:#7c3aed;--r:18px;--shadow:0 14px 35px rgba(0,0,0,.35)}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Inter,sans-serif;background:linear-gradient(135deg,#0b1120,#111827 55%,#1e293b);color:var(--txt)}
header{position:sticky;top:0;z-index:20;background:rgba(15,23,42,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(10px);padding:14px 18px;display:flex;gap:12px;align-items:center;justify-content:space-between}h1{font-size:22px;margin:0}.sub{font-size:13px;color:var(--mut)}
.tabs{display:flex;gap:8px;flex-wrap:wrap}.tab,.btn{border:0;border-radius:12px;padding:10px 13px;background:#334155;color:#fff;font-weight:800;cursor:pointer}.tab.active{background:var(--blue)}.btn.ok{background:var(--ok)}.btn.warn{background:var(--warn);color:#111827}.btn.bad{background:var(--bad)}.btn.blue{background:var(--blue)}.btn.violet{background:var(--violet)}.btn.ghost{background:transparent;border:1px solid #64748b}.btn.small{padding:7px 9px;font-size:12px}.btn:disabled{opacity:.45;cursor:not-allowed}
.wrap{max-width:1500px;margin:auto;padding:18px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.card{background:rgba(31,41,55,.95);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px}.col-12{grid-column:span 12}.col-8{grid-column:span 8}.col-6{grid-column:span 6}.col-4{grid-column:span 4}.col-3{grid-column:span 3}.col-2{grid-column:span 2}
.row{display:flex;gap:9px;align-items:center;flex-wrap:wrap}.right{margin-left:auto}.hidden{display:none!important}.muted{color:var(--mut)}.big{font-size:20px;font-weight:950}.kpi{font-size:32px;font-weight:950}h2{margin:0 0 10px;font-size:20px}h3{margin:0 0 8px;font-size:17px}
label{display:block;margin:8px 0 5px;color:var(--mut);font-size:12px;font-weight:900}input,select,textarea{width:100%;border:1px solid #475569;background:#0f172a;color:#fff;border-radius:12px;padding:10px;outline:none}textarea{min-height:84px;resize:vertical}input[type=file]{padding:8px;background:#111827}
table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid #374151;padding:10px;text-align:left;vertical-align:top}th{background:#0f172a;font-size:12px;text-transform:uppercase;color:#e5e7eb}tr:hover td{background:rgba(255,255,255,.03)}
.pill{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:4px 9px;font-weight:900;font-size:12px;white-space:nowrap}.p-disponible{background:#14532d;color:#bbf7d0}.p-en_servicio{background:#78350f;color:#fde68a}.p-reparacion{background:#7f1d1d;color:#fecaca}.p-no_disponible,.p-baja{background:#334155;color:#e2e8f0}.p-activo{background:#14532d;color:#bbf7d0}.p-inactivo{background:#7f1d1d;color:#fecaca}.p-habitual{background:#1e3a8a;color:#bfdbfe}.p-ocasional{background:#4c1d95;color:#ddd6fe}.p-abierta{background:#7f1d1d;color:#fecaca}.p-cerrada{background:#14532d;color:#bbf7d0}.p-itv_ok{background:#14532d;color:#bbf7d0}.p-itv_proxima{background:#78350f;color:#fde68a}.p-itv_vencida{background:#7f1d1d;color:#fecaca}.p-itv_sin{background:#334155;color:#e2e8f0}
.vehicle-card{display:grid;grid-template-columns:120px 1fr;gap:14px;min-height:130px}.photo{width:120px;height:112px;object-fit:cover;border-radius:15px;border:1px solid #475569;background:#0f172a}.photo.placeholder{display:flex;align-items:center;justify-content:center;color:#94a3b8;font-weight:900}.tools{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}.modal{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:80;display:flex;align-items:flex-start;justify-content:center;padding:26px;overflow:auto}.box{width:min(1000px,96vw);background:#111827;border:1px solid #64748b;border-radius:20px;box-shadow:0 22px 70px rgba(0,0,0,.6);padding:18px}.toast{position:fixed;right:18px;bottom:18px;background:#020617;border:1px solid #64748b;border-radius:14px;padding:12px 14px;box-shadow:var(--shadow);z-index:100}.danger-zone{border:1px dashed #ef4444;background:rgba(127,29,29,.15)}.notice{background:#172554;border:1px solid #2563eb;border-radius:14px;padding:11px;margin:10px 0;color:#dbeafe}.search{max-width:380px}.details{border:1px solid #475569;border-radius:14px;margin-top:14px;overflow:hidden}.details summary{cursor:pointer;padding:12px 14px;background:#0f172a;font-weight:900}.details .inside{padding:12px}.mini{font-size:12px;color:var(--mut)}
@media(max-width:900px){header{align-items:flex-start;flex-direction:column}.grid{grid-template-columns:1fr}.col-12,.col-8,.col-6,.col-4,.col-3,.col-2{grid-column:span 1}.vehicle-card{grid-template-columns:1fr}.photo{width:100%;height:180px}.right{margin-left:0}table{font-size:13px}.wrap{padding:12px}}
</style>
</head>
<body>
<header>
  <div><h1>Control de Vehículos</h1><div class="sub">Versión web · Firestore · datos compartidos en tiempo real</div></div>
  <div class="tabs">
    <button class="tab active" data-view="panel">Panel</button>
    <button class="tab" data-view="vehiculos">Vehículos</button>
    <button class="tab" data-view="usuarios">Usuarios</button>
    <button class="tab" data-view="historial">Historial</button>
    <button class="tab" data-view="reservas">Reservas</button>
    <button class="tab" data-view="incidencias">Incidencias</button>
    <button class="tab" data-view="ajustes">Ajustes</button>
  </div>
</header>
<div class="wrap">
  <section id="view-panel" class="view grid"></section>
  <section id="view-vehiculos" class="view hidden grid"></section>
  <section id="view-usuarios" class="view hidden grid"></section>
  <section id="view-historial" class="view hidden grid"></section>
  <section id="view-reservas" class="view hidden grid"></section>
  <section id="view-incidencias" class="view hidden grid"></section>
  <section id="view-ajustes" class="view hidden grid"></section>
</div>
<div id="modal" class="modal hidden"></div><div id="toast" class="toast hidden"></div>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
const KEY='LDH_VEHICULOS_FIRESTORE_V1';
const $=s=>document.querySelector(s), $$=s=>Array.from(document.querySelectorAll(s));
const empty=()=>({vehiculos:[],usuarios:[],movimientos:[],incidencias:[],reservas:[],config:{empresa:'',version:'firestore_v1'}});
let DB=empty(), view='panel', dbReady=false, syncing=false, loadedCols=new Set();
const COLLECTIONS=['vehiculos','usuarios','movimientos','incidencias','reservas'];
let fs=null;
try{
  firebase.initializeApp(firebaseConfig);
  fs=firebase.firestore();
  try{fs.settings({experimentalAutoDetectLongPolling:true, merge:true});}catch(e){}
}catch(e){
  console.error(e);
  alert('No se pudo iniciar Firebase. Revisa firebase-config.js');
}
function normalizeDB(db){db=db||empty();db.vehiculos=db.vehiculos||[];db.usuarios=db.usuarios||[];db.movimientos=db.movimientos||[];db.incidencias=db.incidencias||[];db.reservas=db.reservas||[];db.config=db.config||{empresa:'',version:'firestore_v1'};return db}
function startRealtime(){
  if(!fs)return;
  try{
    fs.collection('configuracion').doc('main').onSnapshot(doc=>{
      if(doc.exists){DB.config=doc.data()||DB.config}
      loadedCols.add('configuracion'); dbReady=loadedCols.size>=COLLECTIONS.length+1;
      render();
    },err=>console.error(err));

    COLLECTIONS.forEach(col=>{
      fs.collection(col).onSnapshot(snap=>{
        DB[col]=snap.docs.map(d=>({id:d.id,...d.data()}));
        DB=normalizeDB(DB);
        loadedCols.add(col); dbReady=loadedCols.size>=COLLECTIONS.length+1;
        render();
      },err=>{
        console.error(err);
        alert('Error leyendo Firestore en tiempo real. Revisa reglas y conexión.');
      });
    });
    toast('Conectado a Firestore en tiempo real');
  }catch(e){
    console.error(e);
    alert('Error iniciando escucha en tiempo real.');
  }
}
async function loadFromFirestore(){startRealtime()}
async function syncFirestore(){
  if(!fs||!dbReady||syncing){ if(!dbReady) console.warn('Firestore todavía está cargando; guardado omitido.'); return; }
  syncing=true;
  try{
    for(const col of COLLECTIONS){
      const arr=Array.isArray(DB[col])?DB[col]:[];
      const snap=await fs.collection(col).get();
      const batch=fs.batch();
      const ids=new Set(arr.map(x=>x.id).filter(Boolean));
      snap.docs.forEach(d=>{if(!ids.has(d.id))batch.delete(d.ref)});
      arr.forEach(item=>{if(!item.id)item.id=id(col.slice(0,3)); const data={...item}; batch.set(fs.collection(col).doc(item.id),data,{merge:false});});
      await batch.commit();
    }
    await fs.collection('configuracion').doc('main').set(DB.config||{version:'firestore_v1'},{merge:false});
  }catch(e){
    console.error(e);
    alert('Error guardando en Firestore. Revisa reglas y conexión.');
  }finally{syncing=false}
}
function save(){DB=normalizeDB(DB);render();syncFirestore();}
function nowISO(){return new Date().toISOString()}function fmt(x){if(!x)return '';let d=new Date(x);return isNaN(d)?'':d.toLocaleString('es-ES')}
function id(p){return p+'_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7)}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function toast(t){let el=$('#toast');el.textContent=t;el.classList.remove('hidden');setTimeout(()=>el.classList.add('hidden'),2300)}
function labelEstado(e){return ({disponible:'Disponible',en_servicio:'En servicio',reparacion:'En reparación',no_disponible:'No disponible',baja:'Baja'})[e]||e||'Sin estado'}
function pillEstado(e){return `<span class="pill p-${esc(e||'no_disponible')}">${labelEstado(e)}</span>`}
function avisoEstadoVehiculo(v){if(!v)return '';if(v.estado==='reparacion')return '<div class="notice" style="border-color:#f59e0b;background:#422006;color:#fffbeb"><b>VEHÍCULO EN REPARACIÓN</b><br>No disponible para uso ni asignación.</div>';if(v.estado==='no_disponible')return '<div class="notice" style="border-color:#f59e0b;background:#422006;color:#fffbeb"><b>VEHÍCULO NO DISPONIBLE</b><br>No disponible para uso ni asignación.</div>';if(v.estado==='baja')return '<div class="notice" style="border-color:#ef4444;background:#450a0a;color:#fee2e2"><b>VEHÍCULO DADO DE BAJA</b><br>No disponible para uso ni asignación.</div>';return ''}

function daysUntilDate(x){if(!x)return null;let a=new Date(todayISODate()+'T00:00:00'),b=new Date(x+'T00:00:00');if(isNaN(b))return null;return Math.ceil((b-a)/86400000)}
function itvInfo(v){let d=daysUntilDate(v?.itvFecha);if(d===null)return {estado:'sin',txt:'ITV sin fecha',cls:'itv_sin'};if(d<0)return {estado:'vencida',txt:'ITV vencida',cls:'itv_vencida'};if(d<=30)return {estado:'proxima',txt:'ITV próxima: '+d+' día(s)',cls:'itv_proxima'};return {estado:'ok',txt:'ITV OK',cls:'itv_ok'}}
function pillITV(v){let i=itvInfo(v);return `<span class="pill p-${i.cls}">${esc(i.txt)}</span>`}
function avisoITV(v){let i=itvInfo(v);if(i.estado==='vencida')return `<div class="notice" style="border-color:#ef4444;background:#450a0a;color:#fee2e2"><b>ITV VENCIDA</b><br>Fecha prevista: ${esc(dateOnlyEs(v.itvFecha||''))}. Pulsa “ITV pasada” cuando esté renovada.</div>`;if(i.estado==='proxima')return `<div class="notice" style="border-color:#f59e0b;background:#422006;color:#fffbeb"><b>ITV PRÓXIMA</b><br>Fecha prevista: ${esc(dateOnlyEs(v.itvFecha||''))}. Quedan ${esc(daysUntilDate(v.itvFecha))} día(s).</div>`;if(i.estado==='sin')return '<div class="notice">Este vehículo no tiene fecha de ITV registrada.</div>';return ''}

function pill(t,c){return `<span class="pill p-${c}">${esc(t)}</span>`}
function vehName(v){return [v.modelo,v.matricula].filter(Boolean).join(' · ')||'Vehículo'}
function userName(uid){return DB.usuarios.find(u=>u.id===uid)?.nombre||''}
function photo(v){return v.fotoData?`<img class="photo" src="${v.fotoData}">`:`<div class="photo placeholder">SIN FOTO</div>`}
function currentUserVehicle(uid){return DB.vehiculos.find(v=>v.usuarioActualId===uid&&v.estado==='en_servicio')}

function appLinkForUserId(uid){let here=location.href.split(/[?#]/)[0];let base=here.includes('/')?here.substring(0,here.lastIndexOf('/')+1):'';return base+'terminal_vehiculos.html?uid='+encodeURIComponent(uid)}
function normalizarTelefono(t){let n=String(t||'').replace(/\D/g,'');if(n.length===9&&/^[679]/.test(n))n='34'+n;return n}
window.copyAppLink=(uid)=>{let u=DB.usuarios.find(x=>x.id===uid);if(!u||u.tipo!=='habitual'){toast('Solo los usuarios habituales tienen enlace app');return}let link=appLinkForUserId(uid);let ok=()=>toast('Enlace copiado');if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(link).then(ok).catch(()=>prompt('Copia este enlace:',link))}else{prompt('Copia este enlace:',link)}}
window.whatsappAppLink=(uid)=>{let u=DB.usuarios.find(x=>x.id===uid);if(!u||u.tipo!=='habitual'){toast('Solo los usuarios habituales tienen enlace app');return}let phone=normalizarTelefono(u.telefono);if(!phone){alert('Este usuario no tiene teléfono guardado. Añade el teléfono en formato internacional, por ejemplo 34600111222.');return}let link=appLinkForUserId(uid);let msg='Hola '+(u.nombre||'')+', este es tu enlace para acceder a la app de vehículos:\n\n'+link;window.open('https://web.whatsapp.com/send?phone='+encodeURIComponent(phone)+'&text='+encodeURIComponent(msg),'_blank')}

function setView(v){view=v;$$('.tab').forEach(b=>b.classList.toggle('active',b.dataset.view===v));$$('.view').forEach(x=>x.classList.add('hidden'));$('#view-'+v).classList.remove('hidden');render()}
$$('.tab').forEach(b=>b.onclick=()=>setView(b.dataset.view));
function render(){renderPanel();renderVehiculos();renderUsuarios();renderHistorial();renderReservas();renderIncidencias();renderAjustes();}
function renderPanel(){let libres=DB.vehiculos.filter(v=>v.activo!==false&&v.estado==='disponible').length,en=DB.vehiculos.filter(v=>v.estado==='en_servicio').length,rep=DB.vehiculos.filter(v=>v.estado==='reparacion').length,inc=DB.incidencias.filter(i=>i.estado!=='cerrada').length,res=upcomingReservas().length,itv=DB.vehiculos.filter(v=>v.activo!==false&&['vencida','proxima'].includes(itvInfo(v).estado)).length;$('#view-panel').innerHTML=`
 <div class="card col-2"><div class="muted">Disponibles</div><div class="kpi">${libres}</div></div>
 <div class="card col-2"><div class="muted">En servicio</div><div class="kpi">${en}</div></div>
 <div class="card col-2"><div class="muted">En reparación</div><div class="kpi">${rep}</div></div>
 <div class="card col-2"><div class="muted">Reservas pendientes</div><div class="kpi">${res}</div></div>
 <div class="card col-2"><div class="muted">ITV próximas/vencidas</div><div class="kpi">${itv}</div></div>
 <div class="card col-2"><div class="muted">Incidencias abiertas</div><div class="kpi">${inc}</div></div>
 <div class="card col-8"><div class="row"><h2>Vehículos activos</h2><button class="btn ok right" onclick="openVehiculo()">+ Añadir vehículo</button></div>${vehicleCards(DB.vehiculos.filter(v=>v.activo!==false))}</div>
 <div class="card col-4"><h2>En servicio ahora</h2>${enServicioList()}<h2 style="margin-top:18px">Próximas reservas</h2>${miniReservas()}</div>`}
function vehicleCards(arr){if(!arr.length)return '<p class="muted">Sin vehículos.</p>';return arr.map(v=>{let nr=nextReservaFor(v.id);return `<div class="card" style="box-shadow:none;margin:10px 0"><div class="vehicle-card">${photo(v)}<div><div class="row"><div class="big">${esc(vehName(v))}</div>${pillEstado(v.estado)}${pillITV(v)}</div><div class="muted">Usuario actual: ${esc(v.usuarioActualNombre||userName(v.usuarioActualId)||'—')}</div><div class="muted">Próxima ITV: ${v.itvFecha?esc(dateOnlyEs(v.itvFecha)):'—'}</div><div class="muted">Desde: ${fmt(v.fechaRecogidaActual)||'—'}</div><div class="muted">${reservaHoyFor(v.id)?'<b style="color:#fbbf24">RESERVADA HOY</b>: '+esc(reservaHoyFor(v.id).personaNombre||''):'Próxima reserva: '+(nr?esc(dateOnlyEs(nr.fecha)+(nr.horaRecogida?' · '+nr.horaRecogida:'')+' · '+nr.personaNombre):'—')}</div><div class="muted">Desperfectos conocidos: ${esc((v.desperfectosConocidos||[]).join(' · ')||'—')}</div><div class="tools"><button class="btn small blue" onclick="openVehiculo('${v.id}')">Ficha</button><button class="btn small violet" onclick="openAsignar('${v.id}')">Asignar/Devolver</button><button class="btn small ok" onclick="openReserva('${v.id}')">Reservar</button><button class="btn small warn" onclick="openIncidencia('${v.id}')">Incidencia</button><button class="btn small bad" onclick="deleteVehiculo('${v.id}')">Borrar</button></div></div></div></div>`}).join('')}
function enServicioList(){let arr=DB.vehiculos.filter(v=>v.estado==='en_servicio');if(!arr.length)return '<p class="muted">No hay vehículos en servicio.</p>';return arr.map(v=>`<div class="card" style="box-shadow:none;margin:10px 0"><b>${esc(vehName(v))}</b><br><span class="muted">${esc(v.usuarioActualNombre||'Sin usuario')} · ${fmt(v.fechaRecogidaActual)}</span><div class="tools"><button class="btn small ok" onclick="openDevolver('${v.id}')">Devolver</button><button class="btn small warn" onclick="openIncidencia('${v.id}')">Incidencia</button></div></div>`).join('')}
function renderVehiculos(){let q=($('#veh_search')?.value||'').toLowerCase();let arr=DB.vehiculos.filter(v=>!q||JSON.stringify(v).toLowerCase().includes(q));$('#view-vehiculos').innerHTML=`<div class="card col-12"><div class="row"><h2>Vehículos</h2><input id="veh_search" class="search right" placeholder="Buscar matrícula, modelo, estado..." value="${esc(q)}" oninput="renderVehiculos()"><button class="btn ok" onclick="openVehiculo()">+ Añadir</button></div>${vehicleTable(arr)}</div>`}
function vehicleTable(arr){if(!arr.length)return '<p class="muted">Sin resultados.</p>';return `<table><thead><tr><th>Vehículo</th><th>Estado</th><th>ITV</th><th>Usuario actual</th><th>Desperfectos</th><th>Acciones</th></tr></thead><tbody>${arr.map(v=>`<tr><td><div class="row">${v.fotoData?`<img src="${v.fotoData}" style="width:58px;height:48px;object-fit:cover;border-radius:10px">`:''}<div><b>${esc(vehName(v))}</b><br><span class="muted">${v.activo===false?'Archivado':'Activo'}</span></div></div></td><td>${pillEstado(v.estado)}</td><td>${pillITV(v)}<br><span class="muted">${v.itvFecha?dateOnlyEs(v.itvFecha):'—'}</span></td><td>${esc(v.usuarioActualNombre||userName(v.usuarioActualId)||'—')}<br><span class="muted">${fmt(v.fechaRecogidaActual)||''}</span></td><td>${esc((v.desperfectosConocidos||[]).join(' · ')||'—')}</td><td><div class="tools"><button class="btn small blue" onclick="openVehiculo('${v.id}')">Editar</button><button class="btn small violet" onclick="openAsignar('${v.id}')">Movimiento</button><button class="btn small warn" onclick="openIncidencia('${v.id}')">Incidencia</button></div></td></tr>`).join('')}</tbody></table>`}
function renderUsuarios(){let arr=DB.usuarios;$('#view-usuarios').innerHTML=`<div class="card col-12"><div class="row"><h2>Usuarios</h2><button class="btn ok right" onclick="openUsuario('', 'habitual')">+ Habitual</button><button class="btn violet" onclick="openUsuario('', 'ocasional')">+ Ocasional</button></div><div class="notice">Los usuarios ocasionales se crean solo en esta base y no pueden entrar en el terminal móvil.</div>${userTable(arr)}</div>`}
function userTable(arr){if(!arr.length)return '<p class="muted">Sin usuarios.</p>';return `<table><thead><tr><th>Nombre</th><th>Tipo</th><th>Estado</th><th>App móvil</th><th>Vehículo actual</th><th>Acciones</th></tr></thead><tbody>${arr.map(u=>{let v=currentUserVehicle(u.id);let appBtns=(u.tipo==='habitual'&&u.accesoApp)?`<button class="btn small ok" onclick="copyAppLink('${u.id}')">Copiar enlace</button><button class="btn small violet" onclick="whatsappAppLink('${u.id}')">WhatsApp</button>`:'';return `<tr><td><b>${esc(u.nombre)}</b><br><span class="muted">${esc(u.telefono||'')}</span></td><td>${pill(u.tipo||'habitual',u.tipo==='ocasional'?'ocasional':'habitual')}</td><td>${u.activo!==false?pill('Activo','activo'):pill('Desactivado','inactivo')}</td><td>${u.accesoApp&&u.tipo==='habitual'?'Sí':'No'}</td><td>${v?esc(vehName(v)):'—'}</td><td><div class="tools"><button class="btn small blue" onclick="openUsuario('${u.id}')">Editar</button>${appBtns}<button class="btn small bad" onclick="toggleUsuario('${u.id}')">Borrar</button></div></td></tr>`}).join('')}</tbody></table>`}
function renderHistorial(){let rows=allServiceRows().sort((a,b)=>(b.fechaRecogida||b.fechaDevolucion||'').localeCompare(a.fechaRecogida||a.fechaDevolucion||''));$('#view-historial').innerHTML=`<div class="card col-12"><div class="row"><h2>Historial por vehículo</h2><button class="btn blue right" onclick="exportCSV()">Exportar CSV</button></div><div class="notice">El historial general sale agrupado por vehículo. Dentro de cada vehículo, cada línea corresponde a un servicio completo: recogida, devolución e incidencias en la misma fila.</div>${groupedServiceHistory(rows)}</div>`}
function allServiceRows(vehicleId=''){
  let movs=[...DB.movimientos].filter(m=>!vehicleId||m.vehiculoId===vehicleId).sort((a,b)=>(a.fecha||'').localeCompare(b.fecha||''));
  let rows=[], open={};
  for(let m of movs){
    let key=(m.vehiculoId||'')+'|'+(m.usuarioId||'');
    if(m.tipo==='recogida'){
      let r={ids:[m.id],vehiculoId:m.vehiculoId,vehiculoNombre:m.vehiculoNombre||m.matricula||'',matricula:m.matricula||'',usuarioId:m.usuarioId||'',usuarioNombre:m.usuarioNombre||'',usuarioTipo:m.usuarioTipo||'',fechaRecogida:m.fecha||'',fechaDevolucion:'',comentarios:[],incidencias:[],origen:m.origen||''};
      if(m.comentarioTexto)r.comentarios.push('Recogida: '+m.comentarioTexto);
      if(m.incidenciaTexto)r.incidencias.push('Previa a la asignación: '+m.incidenciaTexto);
      if(open[key])rows.push(open[key]);
      open[key]=r;
    }else if(m.tipo==='devolucion'){
      let r=open[key];
      if(!r){r={ids:[],vehiculoId:m.vehiculoId,vehiculoNombre:m.vehiculoNombre||m.matricula||'',matricula:m.matricula||'',usuarioId:m.usuarioId||'',usuarioNombre:m.usuarioNombre||'',usuarioTipo:m.usuarioTipo||'',fechaRecogida:'',fechaDevolucion:'',comentarios:[],incidencias:[],origen:m.origen||''}}
      r.ids.push(m.id);r.fechaDevolucion=m.fecha||'';r.origen=r.origen||m.origen||'';
      if(m.comentarioTexto)r.comentarios.push('Devolución: '+m.comentarioTexto);
      if(m.incidenciaTexto)r.incidencias.push('Devolución: '+m.incidenciaTexto);
      rows.push(r);delete open[key];
    }else{
      let r={ids:[m.id],vehiculoId:m.vehiculoId,vehiculoNombre:m.vehiculoNombre||m.matricula||'',matricula:m.matricula||'',usuarioId:m.usuarioId||'',usuarioNombre:m.usuarioNombre||'',usuarioTipo:m.usuarioTipo||'',fechaRecogida:m.fecha||'',fechaDevolucion:'',comentarios:m.comentarioTexto?[m.comentarioTexto]:[],incidencias:m.incidenciaTexto?[m.incidenciaTexto]:[],origen:m.origen||''};rows.push(r);
    }
  }
  Object.values(open).forEach(r=>rows.push(r));
  return rows;
}
function serviceTable(rows,showVehicle=false){if(!rows.length)return '<p class="muted">Sin servicios todavía.</p>';return `<table><thead><tr><th>Recogida</th><th>Devolución</th>${showVehicle?'<th>Vehículo</th>':''}<th>Usuario</th><th>Comentarios</th><th>Incidencias</th><th>Acciones</th></tr></thead><tbody>${rows.map(r=>{let pendiente=!r.fechaDevolucion;let accion=pendiente?'<span class="mini">Pendiente de devolución</span>':`<button class="btn small bad" onclick="deleteService('${r.ids.join(',')}')">Eliminar</button>`;return `<tr><td>${fmt(r.fechaRecogida)||'—'}</td><td>${fmt(r.fechaDevolucion)||'<span class="mini">Pendiente</span>'}</td>${showVehicle?`<td>${esc(r.vehiculoNombre||'')}</td>`:''}<td>${esc(r.usuarioNombre||'')}</td><td>${esc((r.comentarios||[]).join(' | ')||'—')}</td><td>${esc((r.incidencias||[]).join(' | ')||'—')}</td><td>${accion}</td></tr>`}).join('')}</tbody></table>`}
function groupedServiceHistory(rows){
  if(!rows.length)return '<p class="muted">Sin servicios todavía.</p>';
  let groups={};
  for(let r of rows){
    let key=r.vehiculoId||('vehiculo_sin_id|'+(r.vehiculoNombre||'sin nombre'));
    if(!groups[key])groups[key]={vehiculoId:r.vehiculoId||'',vehiculoNombre:r.vehiculoNombre||'Vehículo',rows:[]};
    groups[key].rows.push(r);
  }
  let ordered=Object.values(groups).sort((a,b)=>String(a.vehiculoNombre||'').localeCompare(String(b.vehiculoNombre||''),'es',{sensitivity:'base'}));
  return ordered.map(g=>{
    let ult=g.rows[0];
    let ultimaFecha=fmt(ult.fechaDevolucion||ult.fechaRecogida)||'—';
    let keep=window.__histOpenVehId&&window.__histOpenVehId===g.vehiculoId?' open':'';
    return `<details class="details"${keep}><summary>${esc(g.vehiculoNombre||'Vehículo')} · ${g.rows.length} servicio(s) · último movimiento: ${esc(ultimaFecha)}</summary><div class="inside">${serviceTable(g.rows,false)}</div></details>`;
  }).join('');
}
function vehicleServiceHistory(vid){let rows=allServiceRows(vid).sort((a,b)=>(b.fechaRecogida||b.fechaDevolucion||'').localeCompare(a.fechaRecogida||a.fechaDevolucion||''));let keep=window.__histOpenVehId&&window.__histOpenVehId===vid?' open':'';return `<details class="details"${keep}><summary>Historial de servicios de este vehículo (${rows.length})</summary><div class="inside"><div class="notice">Aquí queda cada servicio en una sola línea: fecha/hora de recogida, fecha/hora de devolución e incidencias del servicio.</div>${serviceTable(rows,false)}</div></details>`}
window.deleteService=(idsText)=>{let ids=String(idsText||'').split(',').filter(Boolean);if(!ids.length)return;let servicio=DB.movimientos.filter(m=>ids.includes(m.id));let tieneRecogida=servicio.some(m=>m.tipo==='recogida');let tieneDevolucion=servicio.some(m=>m.tipo==='devolucion');if(tieneRecogida&&!tieneDevolucion){alert('No se puede eliminar un servicio pendiente de devolución. Primero debe devolverse el vehículo.');return;}if(!confirm('¿Eliminar este servicio del historial?'))return;let vehId=(servicio[0]&&servicio[0].vehiculoId)||'';window.__histOpenVehId=vehId;DB.movimientos=DB.movimientos.filter(m=>!ids.includes(m.id));save();toast('Servicio eliminado del historial')};

function dateOnlyEs(x){if(!x)return '';let d=new Date(x+'T00:00:00');return isNaN(d)?x:d.toLocaleDateString('es-ES')}
function fechaHoraReserva(r){return esc(dateOnlyEs(r.fecha||'')+(r.horaRecogida?' · '+r.horaRecogida:''))}
function todayISODate(){return new Date().toISOString().slice(0,10)}
function nowLocalDateTime(){
  let d=new Date(),p=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'T'+p(d.getHours())+':'+p(d.getMinutes());
}
function localDateTimeToISO(v){
  if(!v)return nowISO();
  let d=new Date(v);
  return isNaN(d)?nowISO():d.toISOString();
}
function reservaActiva(r){return r&&r.estado!=='cancelada'&&r.estado!=='completada'}
function upcomingReservas(vehiculoId=''){let hoy=todayISODate();return (DB.reservas||[]).filter(r=>(!vehiculoId||r.vehiculoId===vehiculoId)&&reservaActiva(r)&&(!r.fecha||r.fecha>=hoy)).sort((a,b)=>((a.fecha||'')+(a.horaRecogida||'')).localeCompare((b.fecha||'')+(b.horaRecogida||'')))}
function nextReservaFor(vehiculoId){return upcomingReservas(vehiculoId)[0]||null}

function reservasForDate(vehiculoId,fecha){return (DB.reservas||[]).filter(r=>r.vehiculoId===vehiculoId&&reservaActiva(r)&&r.fecha===fecha)}
function reservaHoyFor(vehiculoId){return reservasForDate(vehiculoId,todayISODate())[0]||null}
function sameReservedPerson(r,u){if(!r||!u)return false;if(r.personaId&&r.personaId===u.id)return true;return String(r.personaNombre||'').trim().toLowerCase()===String(u.nombre||'').trim().toLowerCase()}

function completarReservaDevolucion(v,u){let hoy=todayISODate();let arr=(DB.reservas||[]).filter(r=>r.vehiculoId===v.id&&reservaActiva(r)&&r.fecha===hoy&&sameReservedPerson(r,u)).sort((a,b)=>(a.horaRecogida||'').localeCompare(b.horaRecogida||''));if(arr.length){arr[0].estado='completada';arr[0].fechaCompletada=nowISO();return arr[0]}return null}

function reservaFichaAviso(vid){let hoys=reservasForDate(vid,todayISODate()).sort((a,b)=>(a.horaRecogida||'').localeCompare(b.horaRecogida||'')), prox=nextReservaFor(vid);if(hoys.length)return `<div class="notice" style="border-color:#f59e0b;background:#422006;color:#fffbeb"><b>RESERVADA HOY</b><br>${hoys.map(h=>`${h.horaRecogida?`<b>${esc(h.horaRecogida)}</b> · `:''}Reservada para: <b>${esc(h.personaNombre||'')}</b>${h.nota?` · Nota: ${esc(h.nota)}`:''}`).join('<br>')}</div>`;if(prox)return `<div class="notice"><b>Próxima reserva</b><br>${esc(dateOnlyEs(prox.fecha)+(prox.horaRecogida?' · '+prox.horaRecogida:''))} · Reservada para: <b>${esc(prox.personaNombre||'')}</b>${prox.nota?`<br>Nota: ${esc(prox.nota)}`:''}</div>`;return '<div class="notice">Sin reservas pendientes para este vehículo.</div>'}

function miniReservas(){let arr=upcomingReservas().slice(0,5);if(!arr.length)return '<p class="muted">Sin reservas pendientes.</p>';return arr.map(r=>`<div class="card" style="box-shadow:none;margin:10px 0"><b>${fechaHoraReserva(r)}</b><br><span class="muted">${esc(r.vehiculoNombre||'')} · ${esc(r.personaNombre||'')}</span></div>`).join('')}
function renderReservas(){let arr=[...(DB.reservas||[])].filter(r=>reservaActiva(r)).sort((a,b)=>((a.fecha||'')+(a.horaRecogida||'')).localeCompare((b.fecha||'')+(b.horaRecogida||'')));$('#view-reservas').innerHTML=`<div class="card col-12"><div class="row"><h2>Reservas de vehículos</h2><button class="btn ok right" onclick="openReserva()">+ Nueva reserva</button></div><div class="notice">Aquí puedes reservar un vehículo para una fecha concreta y una persona. Las reservas quedan guardadas para consulta y aparecen también en la ficha de cada vehículo.</div>${reservaTable(arr,true)}</div>`}
function reservaTable(arr,showVehicle=true){if(!arr.length)return '<p class="muted">Sin reservas.</p>';return `<table><thead><tr><th>Fecha</th><th>Hora recogida</th>${showVehicle?'<th>Vehículo</th>':''}<th>Reservada para</th><th>Estado</th><th>Nota</th><th>Acciones</th></tr></thead><tbody>${arr.map(r=>`<tr><td>${esc(dateOnlyEs(r.fecha))}</td><td>${esc(r.horaRecogida||'—')}</td>${showVehicle?`<td>${esc(r.vehiculoNombre||'')}</td>`:''}<td>${esc(r.personaNombre||'')}</td><td>${pill(r.estado==='cancelada'?'Cancelada':'Reservada',r.estado==='cancelada'?'inactivo':'activo')}</td><td>${esc(r.nota||'—')}</td><td><div class="tools"><button class="btn small blue" onclick="openReserva('${r.vehiculoId||''}','${r.id}')">Editar</button>${r.estado==='cancelada'?'':`<button class="btn small bad" onclick="cancelReserva('${r.id}')">Cancelar</button>`}</div></td></tr>`).join('')}</tbody></table>`}
function vehicleReservas(vid){let arr=(DB.reservas||[]).filter(r=>r.vehiculoId===vid&&reservaActiva(r)).sort((a,b)=>((a.fecha||'')+(a.horaRecogida||'')).localeCompare((b.fecha||'')+(b.horaRecogida||'')));return `<details class="details"><summary>Reservas de este vehículo (${arr.length})</summary><div class="inside"><div class="notice">Reservas previstas para este vehículo. Puedes editar o cancelar cada reserva.</div>${reservaTable(arr,false)}</div></details>`}
window.openReserva=(vehiculoId='',rid='')=>{let r=(DB.reservas||[]).find(x=>x.id===rid)||{vehiculoId:vehiculoId||'',fecha:todayISODate(),horaRecogida:'',personaId:'',personaNombre:'',nota:'',estado:'reservada'};let vehs=DB.vehiculos.filter(v=>v.activo!==false&&v.estado!=='baja');let users=DB.usuarios.filter(u=>u.activo!==false);modal(`<div class="row"><h2>${rid?'Editar reserva':'Nueva reserva'}</h2><button class="btn ghost right" onclick="closeModal()">Cerrar</button></div><div class="grid"><div class="col-3"><label>Vehículo</label><select id="r_veh">${vehs.map(v=>`<option value="${v.id}">${esc(vehName(v))}</option>`).join('')}</select></div><div class="col-3"><label>Día reservado</label><input id="r_fecha" type="date" value="${esc(r.fecha||todayISODate())}"></div><div class="col-3"><label>Hora prevista de recogida</label><input id="r_hora" type="time" value="${esc(r.horaRecogida||'')}"></div><div class="col-3"><label>Estado</label><select id="r_estado"><option value="reservada">Reservada</option><option value="cancelada">Cancelada</option></select></div><div class="col-6"><label>Persona habitual/ocasional registrada</label><select id="r_user"><option value="">-- Escribir persona manualmente --</option>${users.map(u=>`<option value="${u.id}">${esc(u.nombre)} (${esc(u.tipo||'habitual')})</option>`).join('')}</select></div><div class="col-6"><label>Reservada para</label><input id="r_persona" value="${esc(r.personaNombre||'')}" placeholder="Nombre de la persona"></div><div class="col-12"><label>Nota de reserva</label><textarea id="r_nota" placeholder="Ej: obra, cliente, horario previsto...">${esc(r.nota||'')}</textarea></div><div class="col-12 row"><button class="btn ok" onclick="saveReserva('${rid}')">Guardar reserva</button></div></div>`);if(r.vehiculoId)$('#r_veh').value=r.vehiculoId;if(r.personaId)$('#r_user').value=r.personaId;$('#r_estado').value=r.estado||'reservada';$('#r_user').onchange=()=>{let u=DB.usuarios.find(x=>x.id===$('#r_user').value);if(u)$('#r_persona').value=u.nombre};};
window.saveReserva=(rid='')=>{let v=DB.vehiculos.find(x=>x.id===$('#r_veh').value);if(!v){toast('Selecciona un vehículo');return}let fecha=$('#r_fecha').value;if(!fecha){toast('Indica el día de la reserva');return}let horaRecogida=$('#r_hora').value;if(!horaRecogida){toast('Indica la hora prevista de recogida');return}let personaId=$('#r_user').value;let u=DB.usuarios.find(x=>x.id===personaId);let personaNombre=($('#r_persona').value||u?.nombre||'').trim();if(!personaNombre){toast('Indica para quién queda reservada');return}let estado=$('#r_estado').value;let ya=(DB.reservas||[]).find(r=>r.id!==rid&&r.estado!=='cancelada'&&r.vehiculoId===v.id&&r.fecha===fecha&&(r.horaRecogida||'')===horaRecogida);if(estado!=='cancelada'&&ya){alert('Este vehículo ya está reservado ese día a las '+horaRecogida+' para '+(ya.personaNombre||'otra persona')+'. Puedes reservarlo el mismo día, pero con otra hora prevista de recogida.');return}let data={vehiculoId:v.id,vehiculoNombre:vehName(v),matricula:v.matricula||'',fecha,horaRecogida,personaId:personaId||'',personaNombre,nota:$('#r_nota').value.trim(),estado,updatedAt:nowISO()};if(rid){let r=DB.reservas.find(x=>x.id===rid);if(r)Object.assign(r,data)}else{DB.reservas.push({id:id('res'),...data,createdAt:nowISO()})}save();closeModal();toast(estado==='cancelada'?'Reserva cancelada':'Reserva guardada')};

function origenIncidencia(i){if(i.origen==='recogida'||i.origen==='previa_asignacion')return pill('Previa asignación','abierta');if(i.origen==='devolucion')return pill('Devolución','cerrada');return pill('Administración','habitual')}
function incTable(rows){if(!rows.length)return '<p class="muted">Sin incidencias.</p>';return `<table><thead><tr><th>Fecha</th><th>Vehículo</th><th>Usuario</th><th>Origen incidencia</th><th>Estado</th><th>Incidencia</th><th>Acciones</th></tr></thead><tbody>${rows.map(i=>`<tr><td>${fmt(i.fecha)}</td><td>${esc(i.vehiculoNombre||'')}</td><td>${esc(i.usuarioNombre||'')}</td><td>${origenIncidencia(i)}</td><td>${pill(i.estado||'abierta',i.estado==='cerrada'?'cerrada':'abierta')}</td><td>${esc(i.texto||'')}</td><td><div class="tools">${i.estado==='cerrada'?'':`<button class="btn small ok" onclick="cerrarIncidencia('${i.id}')">Cerrar</button>`}<button class="btn small bad" onclick="borrarIncidencia('${i.id}')">Borrar</button></div></td></tr>`).join('')}</tbody></table>`}

window.openVehiculo=(vid='')=>{let v=DB.vehiculos.find(x=>x.id===vid)||{estado:'disponible',activo:true,desperfectosConocidos:[]};modal(`<div class="row"><h2>Ficha de vehículo</h2><button class="btn ghost right" onclick="closeModal()">Cerrar</button></div><div class="grid"><div class="col-6"><label>Modelo / nombre</label><input id="v_modelo" value="${esc(v.modelo||'')}"></div><div class="col-6"><label>Matrícula</label><input id="v_matricula" value="${esc(v.matricula||'')}"></div><div class="col-4"><label>Estado</label><select id="v_estado"><option value="disponible">Disponible</option><option value="en_servicio">En servicio</option><option value="reparacion">En reparación</option><option value="no_disponible">No disponible</option><option value="baja">Baja</option></select></div><div class="col-4"><label>Visible / activo</label><select id="v_activo"><option value="true">Activo</option><option value="false">Archivado</option></select></div><div class="col-4"><label>Foto del vehículo</label><input id="v_file" type="file" accept="image/*"></div><div class="col-4"><label>Próxima ITV</label><input id="v_itv" type="date" value="${esc(v.itvFecha||'')}"></div><div class="col-4"><label>Periodicidad ITV</label><select id="v_itv_meses"><option value="6">6 meses</option><option value="12">12 meses</option><option value="24">24 meses</option></select></div><div class="col-12"><label>Desperfectos conocidos, uno por línea</label><textarea id="v_desp">${esc((v.desperfectosConocidos||[]).join('\n'))}</textarea></div><div class="col-12"><label>Observaciones internas</label><textarea id="v_obs">${esc(v.observaciones||'')}</textarea></div><div class="col-12 row">${v.fotoData?`<img src="${v.fotoData}" style="width:120px;height:80px;object-fit:cover;border-radius:12px">`:''}<button class="btn ok" onclick="saveVehiculo('${vid}')">Guardar</button>${vid?`<button class="btn blue" onclick="itvPasada('${vid}')">ITV pasada</button><button class="btn warn" onclick="openIncidencia('${vid}')">Añadir incidencia</button><button class="btn bad" onclick="deleteVehiculo('${vid}')">Borrar vehículo</button>`:''}</div><div class="col-12">${vid?avisoEstadoVehiculo(v)+avisoITV(v)+reservaFichaAviso(vid)+vehicleReservas(vid)+vehicleServiceHistory(vid):'<div class="notice">Guarda primero el vehículo para ver reservas e historial aquí.</div>'}</div></div>`);$('#v_estado').value=v.estado||'disponible';$('#v_activo').value=String(v.activo!==false);$('#v_itv_meses').value=String(v.itvMeses||12);};
window.saveVehiculo=(vid)=>{let done=(fotoData)=>{let v=DB.vehiculos.find(x=>x.id===vid);let data={modelo:$('#v_modelo').value.trim(),matricula:$('#v_matricula').value.trim(),estado:$('#v_estado').value,activo:$('#v_activo').value==='true',desperfectosConocidos:$('#v_desp').value.split('\n').map(x=>x.trim()).filter(Boolean),observaciones:$('#v_obs').value.trim(),itvFecha:$('#v_itv').value||'',itvMeses:parseInt($('#v_itv_meses').value||'12',10),updatedAt:nowISO()};if(fotoData)data.fotoData=fotoData;if(v){Object.assign(v,data)}else{DB.vehiculos.push({id:id('veh'),...data,fotoData:fotoData||'',usuarioActualId:'',usuarioActualNombre:'',fechaRecogidaActual:'',createdAt:nowISO()})}save();closeModal();toast('Vehículo guardado')};let f=$('#v_file').files[0];if(f){let r=new FileReader();r.onload=()=>done(r.result);r.readAsDataURL(f)}else done('')};
window.itvPasada=(vid)=>{let v=DB.vehiculos.find(x=>x.id===vid);if(!v)return;let meses=parseInt(v.itvMeses||$('#v_itv_meses')?.value||12,10);let base=new Date();base.setMonth(base.getMonth()+meses);v.itvUltimaPasada=nowISO();v.itvFecha=base.toISOString().slice(0,10);v.itvMeses=meses;v.updatedAt=nowISO();save();closeModal();toast('ITV marcada como pasada. Próxima ITV: '+dateOnlyEs(v.itvFecha))};
window.deleteVehiculo=(vid)=>{let v=DB.vehiculos.find(x=>x.id===vid);if(!v)return;let enServicio=v.estado==='en_servicio'||!!v.usuarioActualId;let reservas=(DB.reservas||[]).filter(r=>r.vehiculoId===vid&&reservaActiva(r));let movimientos=(DB.movimientos||[]).filter(m=>m.vehiculoId===vid);let incidencias=(DB.incidencias||[]).filter(i=>i.vehiculoId===vid);let msg='Vas a BORRAR el vehículo: '+vehName(v)+'.\n\n';if(enServicio){msg+='ATENCIÓN: este vehículo está en servicio. Antes de borrarlo se registrará una devolución automática.\n\n'}if(reservas.length||movimientos.length||incidencias.length){msg+='También se eliminarán datos vinculados al vehículo:\n';if(reservas.length)msg+='- '+reservas.length+' reserva(s) vigente(s).\n';if(incidencias.length)msg+='- '+incidencias.length+' incidencia(s).\n';if(movimientos.length)msg+='- '+movimientos.length+' movimiento(s) de historial.\n'}msg+='\nEsta acción no se puede deshacer. ¿Confirmas el borrado?';if(!confirm(msg))return;if(enServicio){DB.movimientos.push({id:id('mov'),vehiculoId:v.id,vehiculoNombre:vehName(v),matricula:v.matricula||'',usuarioId:v.usuarioActualId||'',usuarioNombre:v.usuarioActualNombre||'',usuarioTipo:'',tipo:'devolucion',origen:'base_pc',fecha:nowISO(),incidenciaTexto:'Devolución automática por borrado de vehículo',estadoVehiculoAntes:v.estado,estadoVehiculoDespues:'borrado'});}DB.reservas=(DB.reservas||[]).filter(r=>r.vehiculoId!==vid);DB.incidencias=(DB.incidencias||[]).filter(i=>i.vehiculoId!==vid);DB.movimientos=(DB.movimientos||[]).filter(m=>m.vehiculoId!==vid);DB.vehiculos=DB.vehiculos.filter(x=>x.id!==vid);save();if(!$('#modal').classList.contains('hidden'))closeModal();toast('Vehículo borrado')};
window.openUsuario=(uid='',tipoDefault='habitual')=>{let u=DB.usuarios.find(x=>x.id===uid)||{tipo:tipoDefault,activo:true,accesoApp:tipoDefault==='habitual'};let tipoInicial=u.tipo||tipoDefault||'habitual';modal(`<div class="row"><h2>${tipoInicial==='ocasional'?'Usuario ocasional':'Usuario'}</h2><button class="btn ghost right" onclick="closeModal()">Cerrar</button></div><div class="grid"><div class="col-6"><label id="u_nombre_lbl">${tipoInicial==='ocasional'?'Nombre usuario ocasional':'Nombre'}</label><input id="u_nombre" type="text" autocomplete="off" placeholder="Escribe el nombre"></div><div class="col-3"><label>Tipo</label><select id="u_tipo"><option value="habitual">Habitual</option><option value="ocasional">Ocasional</option></select></div><div class="col-3"><label>Estado</label><select id="u_activo"><option value="true">Activo</option><option value="false">Desactivado</option></select></div><div class="col-4"><label>Acceso app móvil</label><select id="u_app"><option value="true">Sí</option><option value="false">No</option></select></div><div class="col-4"><label>Teléfono WhatsApp</label><input id="u_tel" type="text" autocomplete="off" placeholder="Ej: 34600111222"></div><div class="col-12"><label>Observaciones</label><textarea id="u_obs"></textarea></div>${uid&&tipoInicial==='habitual'?`<div class="col-12"><div class="notice"><b>Enlace app móvil</b><br><input readonly value="${esc(appLinkForUserId(uid))}" onclick="this.select()"><div class="tools"><button class="btn small ok" onclick="copyAppLink('${uid}')">Copiar enlace</button><button class="btn small violet" onclick="whatsappAppLink('${uid}')">Enviar por WhatsApp</button></div></div></div>`:''}<div class="col-12 row"><button class="btn ok" onclick="saveUsuario('${uid}')">Guardar</button></div></div>`);$('#u_nombre').value=u.nombre||'';$('#u_tel').value=u.telefono||'';$('#u_obs').value=u.observaciones||'';$('#u_tipo').value=tipoInicial;$('#u_activo').value=String(u.activo!==false);$('#u_app').value=String(!!u.accesoApp);let refreshUserForm=()=>{let ocas=$('#u_tipo').value==='ocasional';$('#u_nombre_lbl').textContent=ocas?'Nombre usuario ocasional':'Nombre';$('#u_app').value=ocas?'false':$('#u_app').value;$('#u_app').disabled=ocas;};$('#u_tipo').onchange=refreshUserForm;refreshUserForm();setTimeout(()=>$('#u_nombre')&&$('#u_nombre').focus(),0)};
window.saveUsuario=(uid)=>{let tipo=$('#u_tipo').value;let data={nombre:$('#u_nombre').value.trim(),tipo,activo:$('#u_activo').value==='true',accesoApp:tipo==='habitual'&&$('#u_app').value==='true',telefono:$('#u_tel').value.trim(),observaciones:$('#u_obs').value.trim(),updatedAt:nowISO()};if(!data.nombre){toast('Falta el nombre');return}let u=DB.usuarios.find(x=>x.id===uid);if(u){Object.assign(u,data)}else{DB.usuarios.push({id:id(tipo==='ocasional'?'uso':'usr'),...data,createdAt:nowISO()})}save();closeModal();toast('Usuario guardado')};
window.toggleUsuario=(uid)=>{let u=DB.usuarios.find(x=>x.id===uid);if(!u)return;let vehs=DB.vehiculos.filter(v=>v.usuarioActualId===u.id&&v.estado==='en_servicio');let hoy=todayISODate();let reservas=(DB.reservas||[]).filter(r=>reservaActiva(r)&&(!r.fecha||r.fecha>=hoy)&&sameReservedPerson(r,u));let msg='Vas a BORRAR el usuario: '+u.nombre+'.\n\nEl historial antiguo no se pierde porque los movimientos ya guardan el nombre del usuario.';if(vehs.length||reservas.length){msg+='\n\nEste usuario tiene datos vigentes:';if(vehs.length)msg+='\n- '+vehs.length+' vehículo(s) actualmente en servicio.';if(reservas.length)msg+='\n- '+reservas.length+' reserva(s) vigente(s).';msg+='\n\nAntes de borrarlo se limpiará lo siguiente:';if(vehs.length)msg+='\n- Se registrará devolución automática de sus vehículos en servicio.';if(reservas.length)msg+='\n- Se eliminarán sus reservas vigentes.';}msg+='\n\n¿Confirmas el borrado?';if(!confirm(msg))return;vehs.forEach(v=>{let antes=v.estado;DB.movimientos.push({id:id('mov'),vehiculoId:v.id,vehiculoNombre:vehName(v),matricula:v.matricula||'',usuarioId:u.id,usuarioNombre:u.nombre,usuarioTipo:u.tipo||'habitual',tipo:'devolucion',origen:'base_pc',fecha:nowISO(),incidenciaTexto:'Devolución automática por borrado de usuario',estadoVehiculoAntes:antes,estadoVehiculoDespues:'disponible'});v.estado='disponible';v.usuarioActualId='';v.usuarioActualNombre='';v.fechaRecogidaActual=''});if(reservas.length){let ids=new Set(reservas.map(r=>r.id));DB.reservas=(DB.reservas||[]).filter(r=>!ids.has(r.id));}DB.usuarios=DB.usuarios.filter(x=>x.id!==uid);save();toast('Usuario borrado')};
window.openAsignar=(vid)=>{let v=DB.vehiculos.find(x=>x.id===vid),users=DB.usuarios.filter(u=>u.activo!==false);modal(`<div class="row"><h2>Asignar / devolver</h2><button class="btn ghost right" onclick="closeModal()">Cerrar</button></div><p><b>${esc(vehName(v))}</b> ${pillEstado(v.estado)}</p><div class="grid"><div class="col-4"><label>Usuario</label><select id="as_user">${users.map(u=>`<option value="${u.id}">${esc(u.nombre)} (${esc(u.tipo||'habitual')})</option>`).join('')}</select></div><div class="col-4"><label>Acción</label><select id="as_tipo"><option value="recogida">Recogida / asignar</option><option value="devolucion">Devolución</option></select></div><div class="col-4"><label>Fecha y hora real del movimiento</label><input id="as_fecha_hora" type="datetime-local" value="${nowLocalDateTime()}"></div><div class="col-12"><div class="notice">Usa este campo si el vehículo se recogió o devolvió cuando no estabas. La app móvil sigue registrando automáticamente la hora real del operario.</div></div><div class="col-6"><label>Comentario interno del servicio</label><textarea id="as_comentario" placeholder="Ej: lo recogerá tal persona, dejar llaves en oficina, aviso interno..."></textarea></div><div class="col-6"><label>Incidencia real / desperfecto</label><textarea id="as_incidencia" placeholder="Ej: golpe, luz fundida, rueda baja, avería... Si escribes aquí, sí quedará como incidencia."></textarea></div><div class="col-12 row"><button class="btn ok" onclick="saveAsignacion('${vid}')">Confirmar</button></div></div>`);if(v.usuarioActualId)$('#as_user').value=v.usuarioActualId;$('#as_tipo').value=v.estado==='en_servicio'?'devolucion':'recogida'};
window.saveAsignacion=(vid)=>{let v=DB.vehiculos.find(x=>x.id===vid),u=DB.usuarios.find(x=>x.id===$('#as_user').value),tipo=$('#as_tipo').value,comentario=($('#as_comentario')?.value||'').trim(),incidencia=($('#as_incidencia')?.value||'').trim(),fechaMovimiento=localDateTimeToISO($('#as_fecha_hora')?.value);if(!v||!u){toast('Falta vehículo o usuario');return}if(tipo==='recogida'&&['reparacion','no_disponible','baja'].includes(v.estado)){alert('Este vehículo está '+labelEstado(v.estado).toLowerCase()+' y no está disponible para asignación.');return}let reservasHoy=reservasForDate(v.id,todayISODate());if(tipo==='recogida'&&reservasHoy.length&&!reservasHoy.some(r=>sameReservedPerson(r,u))){alert('Este vehículo tiene reservas hoy para: '+reservasHoy.map(r=>(r.horaRecogida?r.horaRecogida+' · ':'')+(r.personaNombre||'')).join(' / ')+'. No se puede prestar a otro usuario en el día reservado.');return}let antes=v.estado;if(tipo==='recogida'){v.estado='en_servicio';v.usuarioActualId=u.id;v.usuarioActualNombre=u.nombre;v.fechaRecogidaActual=fechaMovimiento}else{v.estado='disponible';v.usuarioActualId='';v.usuarioActualNombre='';v.fechaRecogidaActual=''}DB.movimientos.push({id:id('mov'),vehiculoId:v.id,vehiculoNombre:vehName(v),matricula:v.matricula||'',usuarioId:u.id,usuarioNombre:u.nombre,usuarioTipo:u.tipo||'habitual',tipo,origen:'base_pc',fecha:fechaMovimiento,fechaRegistro:nowISO(),comentarioTexto:comentario,incidenciaTexto:incidencia,estadoVehiculoAntes:antes,estadoVehiculoDespues:v.estado});if(tipo==='devolucion')completarReservaDevolucion(v,u);if(incidencia)addInc(v,u,incidencia,tipo==='recogida'?'previa_asignacion':tipo);save();closeModal();toast('Movimiento registrado')};
window.openDevolver=(vid)=>{let v=DB.vehiculos.find(x=>x.id===vid);modal(`<div class="row"><h2>Registrar devolución</h2><button class="btn ghost right" onclick="closeModal()">Cerrar</button></div><p><b>${esc(vehName(v))}</b><br><span class="muted">Usuario actual: ${esc(v.usuarioActualNombre||'')}</span></p><label>Fecha y hora real de devolución</label><input id="dev_fecha_hora" type="datetime-local" value="${nowLocalDateTime()}"><div class="notice">Puedes cambiar esta fecha/hora si el vehículo fue devuelto cuando no estabas y lo estás registrando más tarde.</div><label>Comentario interno de devolución</label><textarea id="dev_comentario" placeholder="Ej: lo dejó ayer por la tarde, llaves en oficina, comentario interno..."></textarea><label>Incidencia real de devolución</label><textarea id="dev_incidencia" placeholder="Ej: golpe, avería, desperfecto nuevo... Si escribes aquí, sí quedará como incidencia."></textarea><div class="tools"><button class="btn ok" onclick="confirmDevolver('${vid}')">Confirmar devolución</button></div>`)};
window.confirmDevolver=(vid)=>{let v=DB.vehiculos.find(x=>x.id===vid),comentario=($('#dev_comentario')?.value||'').trim(),incidencia=($('#dev_incidencia')?.value||'').trim(),u={id:v.usuarioActualId||'',nombre:v.usuarioActualNombre||'',tipo:'habitual'},antes=v.estado,fechaMovimiento=localDateTimeToISO($('#dev_fecha_hora')?.value);DB.movimientos.push({id:id('mov'),vehiculoId:v.id,vehiculoNombre:vehName(v),matricula:v.matricula||'',usuarioId:u.id,usuarioNombre:u.nombre,tipo:'devolucion',origen:'base_pc',fecha:fechaMovimiento,fechaRegistro:nowISO(),comentarioTexto:comentario,incidenciaTexto:incidencia,estadoVehiculoAntes:antes,estadoVehiculoDespues:'disponible'});completarReservaDevolucion(v,u);if(incidencia)addInc(v,u,incidencia,'devolucion');v.estado='disponible';v.usuarioActualId='';v.usuarioActualNombre='';v.fechaRecogidaActual='';save();closeModal();toast('Devolución registrada')};
function addInc(v,u,txt,origen){DB.incidencias.push({id:id('inc'),vehiculoId:v.id,vehiculoNombre:vehName(v),usuarioId:u?.id||'',usuarioNombre:u?.nombre||'',texto:txt,estado:'abierta',origen,fecha:nowISO(),revisadaPorAdmin:false})}
window.openIncidencia=(vid='')=>{modal(`<div class="row"><h2>Nueva incidencia</h2><button class="btn ghost right" onclick="closeModal()">Cerrar</button></div><label>Vehículo</label><select id="i_veh">${DB.vehiculos.map(v=>`<option value="${v.id}">${esc(vehName(v))}</option>`).join('')}</select><label>Usuario relacionado, opcional</label><select id="i_user"><option value="">—</option>${DB.usuarios.map(u=>`<option value="${u.id}">${esc(u.nombre)}</option>`).join('')}</select><label>Texto de la incidencia</label><textarea id="i_txt"></textarea><div class="tools"><button class="btn warn" onclick="saveIncidencia()">Guardar incidencia</button></div>`);if(vid)$('#i_veh').value=vid};
window.saveIncidencia=()=>{let v=DB.vehiculos.find(x=>x.id===$('#i_veh').value),u=DB.usuarios.find(x=>x.id===$('#i_user').value),txt=$('#i_txt').value.trim();if(!v||!txt){toast('Falta vehículo o texto');return}addInc(v,u,txt,'base_pc');save();closeModal();toast('Incidencia guardada')};
window.cerrarIncidencia=(iid)=>{let i=DB.incidencias.find(x=>x.id===iid);if(!i)return;i.estado='cerrada';i.fechaCierre=nowISO();i.revisadaPorAdmin=true;save();toast('Incidencia cerrada')};
window.borrarIncidencia=(iid)=>{let i=DB.incidencias.find(x=>x.id===iid);if(!i)return;if(!confirm('¿Borrar esta incidencia? Esta acción elimina la incidencia de la lista para no acumular registros antiguos.'))return;DB.incidencias=DB.incidencias.filter(x=>x.id!==iid);save();toast('Incidencia borrada')};
window.exportCSV=()=>{let servicios=allServiceRows().sort((a,b)=>(a.fechaRecogida||a.fechaDevolucion||'').localeCompare(b.fechaRecogida||b.fechaDevolucion||''));let rows=[['recogida','devolucion','vehiculo','usuario','comentarios','incidencias'],...servicios.map(r=>[fmt(r.fechaRecogida),fmt(r.fechaDevolucion),r.vehiculoNombre,r.usuarioNombre,(r.comentarios||[]).join(' | '),(r.incidencias||[]).join(' | ')])];downloadText('historial_servicios_vehiculos.csv',rows.map(r=>r.map(x=>'"'+String(x??'').replaceAll('"','""')+'"').join(';')).join('\n'),'text/csv')};
function downloadText(name,text,type){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500)}
window.downloadBackup=()=>downloadText('copia_control_vehiculos_firestore.json',JSON.stringify(DB,null,2),'application/json');
window.importBackup=()=>{let inp=document.createElement('input');inp.type='file';inp.accept='application/json';inp.onchange=()=>{let f=inp.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{DB=JSON.parse(r.result);save();toast('Copia importada')}catch(e){toast('JSON no válido')}};r.readAsText(f)};inp.click()};
window.resetDB=()=>{if(confirm('¿Seguro que quieres borrar todos los datos de Firestore de esta app?')){DB=empty();save();toast('Datos borrados')}};
render();
loadFromFirestore();
</script>
</body>
</html>
